    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #0c1016; height: auto !important; overflow-y: auto !important; }
      button:focus-visible, textarea:focus-visible, input:focus-visible { outline: 2px solid #caa24e; outline-offset: 2px; }
      @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
      @keyframes slotFlash { 0% { box-shadow: 0 0 0 0 rgba(202,162,78,0); } 30% { box-shadow: 0 0 0 2px rgba(202,162,78,0.7); } 100% { box-shadow: 0 0 0 0 rgba(202,162,78,0); } }
      @media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }
    </style>
